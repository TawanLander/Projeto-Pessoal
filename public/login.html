<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Document</title>
    <link rel="stylesheet" href="./sources/css/all.css" />
    <link rel="stylesheet" href="./sources/css/login.css" />
    <link rel="icon" href="" />
    <script src="./sources/js/script.js" defer></script>
    <script src="./sources/js/componentesPagina.js" defer></script>
    <script src="./sources/js/main.js" defer></script>
    <script src="./sources/js/sessao.js" defer></script>

<body onload="carregarElementos('login')">
    <header></header>
    <main>
        <div class="container">
            <div class="login">
                <h1>Login</h1>
                <label>Email</label>
                <input value="tlander2007@Gmail.com" autocomplete="off" spellcheck="false" type="text" id="ipt-email" placeholder="email@email.com" required oninput="verificarEmail()" onclick="verificarEmail()" onblur="limparClass()">
                <div id="erro-email" class="erro sumir">Email está incorreto! Verifique a digitação.</div>
                <label>Senha</label>
                <input value="SenhaFortona12#" spellcheck="false" type="password" id="ipt-senha" placeholder="******" required oninput="verificarSenha()" onclick="verificarSenha()" onblur="limparClass()">
                <div id="erro-senha" class="erro sumir">

                </div>
                <button type="submit" class="btn-importante" onclick="login()">Entrar</button>
                <div class="mudar">
                    <h4>Não fez seu cadastro ainda? <a href="./cadastro.html">Cadastrar</a></h4>
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
</body>
</html>
