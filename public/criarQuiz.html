<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin">
    <title>Vou Pensar</title>
    <link rel="stylesheet" href="./sources/css/all.css" />
    <link rel="stylesheet" href="./sources/css/criarQuiz.css" />
    <link rel="icon" href="" />
    <script src="./sources/js/main.js" defer></script>
    <script src="./sources/js/quiz.js" defer></script>
    <script src="./sources/js/componentesPagina.js" defer></script>
    <script src="./sources/js/criarQuiz.js" defer></script>
  </head>
  <body onload="carregarElementos('criarQuiz'), montagemQuiz(5)">
    <header></header>
    <main>
        <div class="container">
          <div id="criar-quiz" class="show">
            <h1>Monte seu quiz! Insira as informações abaixo</h1>
            <label>Imagem do Quiz</label>
            <input type="text" id="quiz-img" placeholder="Imagem do quiz" oninput="montagemQuiz(4)">
            <label>Título do Quiz</label>
            <input type="text" id="quiz-titulo" placeholder="Título do quiz" oninput="montagemQuiz(1)">
            <label>Gênero do Quiz</label>
            <select id="quiz-genero" onchange="montagemQuiz(2)">
              <option hidden selected disabled>Selecione alguma opção!</option>
              <option>Anime</option>
              <option>Filmes</option>
              <option>Séries</option>
              <option>Mangá</option>
              <option>HQ's</option>
              <option>Livros</option>
              <option>Jogos</option>
            </select>
            <label>Tipo do Quiz</label>
            <select id="quiz-tipo" onchange="montagemQuiz(3)">
              <option hidden selected disabled>Selecione alguma opção!</option>
              <option>Conhecimentos Gerais</option>
              <option>Conhecimento do tema</option>
              <option>Personalidade</option>
            </select>
            <h1>Acompanhe as modificações</h1>
              <div class="quiz">
                <img id="img-quiz-template">
                <div class="geral">
                <h1 id="titulo-quiz-template">Insira o título</h1>
                <div class="content" id="genero-quiz-template">Insira o gênero</div>
                <div class="content" id="tipo-quiz-template">Insira o tipo</div>
                <div class="content">Quantidade de perguntas</div>
                <div class="content">Avaliação</div>
                <div class="content" id="nome-quiz-template"></div>
              </div> 
            </div>
            <button onclick="prosseguirPerguntas('i')" class="btn-importante">Criar perguntas!</button>

          </div>
          <div id="criar-perguntas" class="show sumir">
            <h1>Comece sua pergunta!</h1>
            <button onclick="prosseguirPerguntas('v')" class="btn-importante" style="margin-top: 0;">Voltar</button>
            <label>Imagem da Pergunta</label>
            <input type="text" id="pergunta-img" placeholder="Imagem da Pergunta" oninput="montagemPergunta()">
          </div>
        </div>
    </main>
    <footer></footer>
</body>
</html>
